################################################################################
[font.normal]
    #family = "0xProtoNerdFont"
    family = "TerminessNerdFont"
    #family = "ComicShannsMonoNerdFont"
    #family = "UbuntuMonoNerdFont"
    #family = "IosevkaTermSlabNerdFont"
    #family = "ProggyCleanCENerdFont"
    #style = "bold"

[font]
    size =    9.0 #TerminessNerdFont
    #size =  12.0 #ProggyCleanNerdFont
    #size =  24.0 #ProggyCleanNerdFont
    #size =  14.0 #IosevkaTermSlabNerdFont
    #size =  12.5 #0xProtoNerdFont

[font.offset]
    x =  0
    y = -3
