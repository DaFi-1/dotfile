################################################################################
# patorjk.com [RubiFont]
[window.padding]
    x = 0
    y = 0

[window]
    decorations = "none"
    dynamic_title = false
    opacity = 1.0

[scrolling]
    history = 10000
    multiplier = 3

[cursor.style]
    shape = "Beam"
    blinking = "On"
